<div class="meal-details-container" *ngIf="!loading && !error">

  <h2 class="meal-title">{{ meal.strMeal }}</h2>

  <div class="meal-content">

    <!-- Image -->
    <div class="meal-image">
      <img
        [src]="meal.strMealThumb"
        [alt]="meal.strMeal"
      />
    </div>

    <!-- Infos -->
    <div class="meal-info">

      <!-- Favorite button -->
      <button class="favorite-btn" (click)="toggleFavorite()">
        <span *ngIf="!isFavorite">⭐ Ajouter aux favoris</span>
        <span *ngIf="isFavorite">💔 Retirer des favoris</span>
      </button>

      <div class="meal-meta">
        <p><strong>Catégorie :</strong> {{ meal.strCategory }}</p>
        <p><strong>Origine :</strong> {{ meal.strArea }}</p>
      </div>

      <!-- Ingredients -->
      <h3>Ingrédients</h3>
      <ul class="ingredients-list">
        <li *ngFor="let ing of meal.ingredients">
          {{ ing.measure }} {{ ing.name }}
        </li>
      </ul>

      <!-- Instructions -->
      <h3>Instructions</h3>
      <ol class="instructions-list">
        <li *ngFor="let step of instructionsList">
          {{ step }}
        </li>
      </ol>

      <!-- Youtube -->
      <a
        *ngIf="meal.strYoutube"
        [href]="meal.strYoutube"
        target="_blank"
        class="btn-youtube"
      >
        ▶ Voir la vidéo
      </a>

    </div>
  </div>
</div>

<div *ngIf="loading" class="loading">Chargement...</div>
<div *ngIf="error" class="error">{{ error }}</div>
