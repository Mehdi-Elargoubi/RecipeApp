<div class="ingredients-container">

  <h2 class="ingredients-title">Liste des ingrédients</h2>

  <!-- Search Bar -->
  <div class="search-bar">
    <input
      type="text"
      placeholder="🔍 Rechercher un ingrédient..."
      [(ngModel)]="searchTerm"
      (input)="filterIngredients()"
    />
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">
    Chargement...
  </div>

  <!-- Error -->
  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <!-- Ingredients Grid -->
  <div class="ingredients-grid" *ngIf="!loading && !error">
    <div
      class="ingredient-card"
      *ngFor="let ing of filteredIngredients"
      [routerLink]="['/ingredients', ing.strIngredient]"
    >
      {{ ing.strIngredient }}
    </div>
  </div>

</div>
