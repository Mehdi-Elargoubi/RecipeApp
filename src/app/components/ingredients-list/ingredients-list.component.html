<div class="container">

  <h2 class="title">🥕 Ingredients List</h2>

  <!-- Search Bar -->
  <input
    type="text"
    class="search-input"
    placeholder="🔍 Rechercher un ingrédient..."
    [(ngModel)]="searchTerm"
    (input)="filterIngredients()"
  />

  <!-- Loading -->
  <div *ngIf="loading" class="loading">Chargement...</div>

  <!-- Error -->
  <div *ngIf="error" class="error">{{ error }}</div>

  <!-- Ingredients Grid -->
  <div class="ingredients-grid" *ngIf="!loading && !error">

    <div class="ingredient-card" *ngFor="let ing of filteredIngredients" [routerLink]="['/ingredients', ing.strIngredient]">
      <h3>{{ ing.strIngredient }}</h3>
      <!-- <p>{{ ing.strDescription | slice:0:120 }}...</p> -->
    </div>

  </div>

</div>
