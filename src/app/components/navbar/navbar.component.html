<nav class="navbar">
  <h2>projet devops</h2>

  <div class="nav-buttons">
    <!-- 🔓 Si l’utilisateur n’est PAS connecté -->
    <ng-container *ngIf="!(user$ | async)">
      <button routerLink="/login" routerLinkActive="active">Connexion</button>
      <button routerLink="/signup" routerLinkActive="active">Inscription</button>
    </ng-container>

    <!-- 🔐 Si l’utilisateur est connecté -->
    <ng-container *ngIf="user$ | async as user">
      <button routerLink="/all-meals" routerLinkActive="active">Toutes les recettes</button>
      <button routerLink="/categories" routerLinkActive="active">Voir les catégories</button>
      <button routerLink="/areas" routerLinkActive="active">Voir les régions</button>
      <button routerLink="/multi-ingredient-filter" routerLinkActive="active">Filtrer par multi-ingrédients</button>
      <button routerLink="/ingredients" routerLinkActive="active">Voir les ingrédients</button>

      <button routerLink="/dashboard" routerLinkActive="active">Tableau de bord</button>
      <button routerLink="/favorites" routerLinkActive="active">⭐ Mes Favoris</button>
      <button routerLink="/meal-history" routerLinkActive="active">📜 Historique des repas</button>
      <button routerLink="/profile" routerLinkActive="active">👤 Mon Profil</button>
      <button (click)="logout()">Déconnexion</button>
    </ng-container>
  </div>
</nav>
