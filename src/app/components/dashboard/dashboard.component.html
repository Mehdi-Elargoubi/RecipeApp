<div class="dashboard-container">

  <h2 class="dashboard-title">🔍 Recherche de recettes</h2>

  <!-- Search bar -->
  <div class="search-bar">
    <input
      type="text"
      placeholder="Rechercher une recette par nom..."
      (input)="onSearchInput($event)"
    >
  </div>

  <!-- Loading / Error -->
  <div *ngIf="loading" class="loading">
    Chargement des recettes...
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <!-- Meals Grid -->
  <div class="meals-grid" *ngIf="!loading && !error">
    <div
      class="meal-card"
      *ngFor="let meal of meals"
      [routerLink]="['/meal', meal.idMeal]"
    >

      <img
        [src]="meal.strMealThumb"
        [alt]="meal.strMeal"
      >

      <h3>{{ meal.strMeal }}</h3>

      <p><strong>Catégorie :</strong> {{ meal.strCategory }}</p>
      <p><strong>Origine :</strong> {{ meal.strArea }}</p>

      <h4>Ingrédients :</h4>
      <ul class="ingredients-list">
        <li *ngFor="let ing of meal.ingredients">
          {{ ing.measure }} {{ ing.name }}
        </li>
      </ul>

      <a
        *ngIf="meal.strYoutube"
        class="btn-primary"
        [href]="meal.strYoutube"
        target="_blank"
        (click)="$event.stopPropagation()"
      >
        🎬 Voir la vidéo
      </a>

    </div>
  </div>

</div>
