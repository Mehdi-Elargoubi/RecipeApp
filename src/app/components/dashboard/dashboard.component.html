<div class="dashboard-container">
  <h2>🍽️ Recettes du monde</h2>

  <div *ngIf="loading" class="loading">
    Chargement des recettes...
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <div class="grid" *ngIf="!loading && !error">
    <div class="card" *ngFor="let meal of meals">
      <img [src]="meal.strMealThumb" [alt]="meal.strMeal">
      <h3>{{ meal.strMeal }}</h3>
      <p><strong>Catégorie:</strong> {{ meal.strCategory }}</p>
      <p><strong>Origine:</strong> {{ meal.strArea }}</p>
      <button (click)="showInstructions(meal.strInstructions)">Voir les étapes</button>

    </div>
  </div>
</div>
