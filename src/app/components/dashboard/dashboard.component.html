<div class="dashboard-container">

  <!-- Barre de recherche -->
  <div class="search-bar">
    <input type="text" [(ngModel)]="searchName" placeholder="Rechercher une recette par nom" />
    <button (click)="searchMeals()">Rechercher</button>
  </div>

  <!-- Affichage loading / erreur -->
  <div *ngIf="loading" class="loading">Chargement des recettes...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <!-- Liste des recettes -->
  <div class="meals-container">
    <div class="meal-card" *ngFor="let meal of meals">
      <img [src]="meal.strMealThumb" [alt]="meal.strMeal" />
      <h3>{{ meal.strMeal }}</h3>
      <p><strong>Catégorie :</strong> {{ meal.strCategory }}</p>
      <p><strong>Origine :</strong> {{ meal.strArea }}</p>

      <h4>Ingrédients :</h4>
      <ul>
        <li *ngFor="let ing of meal.ingredients">{{ ing.measure }} {{ ing.name }}</li>
      </ul>

      <button (click)="showInstructions(meal.strInstructions)">Voir les étapes</button>
      <a *ngIf="meal.strYoutube" [href]="meal.strYoutube" target="_blank">Voir la vidéo</a>
    </div>
  </div>

</div>
