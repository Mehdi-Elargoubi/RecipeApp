<p>category-meals works!</p>
<div class="container">

  <h2 class="title">🍽️ Plats de la catégorie : {{ category }}</h2>

  <div *ngIf="loading" class="loading">Chargement...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="categories-grid" *ngIf="!loading && !error">
    <div class="category-card" *ngFor="let meal of meals">
      <img [src]="meal.strMealThumb" [alt]="meal.strMeal">
      <h3>{{ meal.strMeal }}</h3>
      <a [routerLink]="['/meal', meal.idMeal]" class="btn-details">Voir détails</a>
    </div>
  </div>

</div>
