<div class="filter-container">

  <h2 class="filter-title">🧩 Filtrer par ingrédients</h2>

  <!-- Search input -->
  <div class="search-bar">
    <input
      type="text"
      placeholder="Ajouter un ingrédient..."
      [(ngModel)]="ingredientSearch"
      (input)="filterSuggestions()"
    />
  </div>

  <!-- Suggestions -->
  <div class="suggestions" *ngIf="suggestions.length > 0">
    <div
      class="suggestion"
      *ngFor="let ing of suggestions"
      (click)="addIngredient(ing)"
    >
      {{ ing }}
    </div>
  </div>

  <!-- Selected ingredients -->
  <div class="chips">
    <span class="chip" *ngFor="let ing of selectedIngredients">
      {{ ing }}
      <button (click)="removeIngredient(ing)">✖</button>
    </span>
  </div>

  <!-- Results -->
  <div class="results">

    <p *ngIf="loading" class="loading">
      Chargement des recettes...
    </p>

    <p
      class="empty-state"
      *ngIf="!loading && filteredMeals.length === 0 && selectedIngredients.length > 0"
    >
      Aucune recette ne correspond à ces ingrédients.
    </p>

    <div class="meals-grid" *ngIf="filteredMeals.length > 0">
      <div
        class="meal-card"
        *ngFor="let meal of filteredMeals"
        [routerLink]="['/meal', meal.idMeal]"
      >

        <img
          [src]="meal.strMealThumb"
          [alt]="meal.strMeal"
        >

        <h3>{{ meal.strMeal }}</h3>

      </div>
    </div>

  </div>

</div>
