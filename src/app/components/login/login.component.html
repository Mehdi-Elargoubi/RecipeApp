<div class="login-wrapper">
  <div class="login-card">
    <h2>Connexion</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <input type="email" formControlName="email" placeholder="Email" required />
      <input type="password" formControlName="password" placeholder="Mot de passe" required />
      <button type="submit" [disabled]="loading">{{ loading ? 'Connexion...' : 'Se connecter' }}</button>
    </form>

    <button class="google-btn" (click)="loginWithGoogle()">Se connecter avec Google</button>

    <p>Pas encore de compte ? <a routerLink="/signup">Créer un compte</a></p>
  </div>
</div>
