<div class="visited-container">

  <h2 class="visited-title">🕒 Recettes consultées</h2>

  <div *ngIf="loading" class="loading">
    Chargement...
  </div>

  <p
    class="empty-state"
    *ngIf="!loading && visitedMeals.length === 0"
  >
    Aucune recette consultée pour le moment.
  </p>

  <div class="meals-grid" *ngIf="visitedMeals.length > 0">
    <div
      class="meal-card"
      *ngFor="let meal of visitedMeals"
      (click)="goToMeal(meal.idMeal)"
    >

      <img
        [src]="meal.strMealThumb"
        [alt]="meal.strMeal"
      >

      <h3>{{ meal.strMeal }}</h3>

      <p class="meal-meta">
        {{ meal.strCategory }} • {{ meal.strArea }}
      </p>

    </div>
  </div>

</div>
