<div class="profile-page" *ngIf="userData">

  <!-- PROFILE CARD -->
  <div class="profile-container">

    <h2 class="profile-title">👤 Mon Profil</h2>

    <!-- Avatar -->
    <div class="photo-section">
      <img
        *ngIf="previewUrl"
        [src]="previewUrl"
        alt="Photo utilisateur"
        class="user-avatar"
      />
      <input
        type="file"
        (change)="onFileSelected($event)"
        [disabled]="!isEditing"
      />
    </div>

    <!-- Form -->
    <form [formGroup]="profileForm" (ngSubmit)="onSave()" class="profile-form">

      <div class="form-group">
        <label>Prénom</label>
        <input formControlName="firstName" type="text" [readonly]="!isEditing" />
      </div>

      <div class="form-group">
        <label>Nom</label>
        <input formControlName="lastName" type="text" [readonly]="!isEditing" />
      </div>

      <div class="form-group">
        <label>Date de naissance</label>
        <input formControlName="birthDate" type="date" [readonly]="!isEditing" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          formControlName="email"
          type="email"
          readonly
          class="readonly-field"
        />
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          formControlName="password"
          type="password"
          [readonly]="!isEditing"
        />
      </div>

      <!-- Buttons -->
      <div class="buttons">
        <button
          type="button"
          class="btn-primary"
          *ngIf="!isEditing"
          (click)="enableEditing()"
        >
          Modifier
        </button>

        <button
          type="submit"
          class="btn-success"
          *ngIf="isEditing"
          [disabled]="loading"
        >
          Sauvegarder
        </button>

        <button
          type="button"
          class="btn-danger"
          *ngIf="isEditing"
          (click)="onCancel()"
        >
          Annuler
        </button>
      </div>

    </form>

  </div>


  <!-- FAVORITES -->
  <section class="profile-section">
    <h3>⭐ Mes favoris</h3>
    <app-favorites [showTitle]="false"></app-favorites>
  </section>


  <!-- HISTORY -->
  <section class="profile-section">
    <h3>🕒 Recettes consultées</h3>
    <app-meal-history></app-meal-history>
  </section>

</div>
