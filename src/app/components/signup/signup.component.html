<div class="signup-container">
  <h2>Créer un compte</h2>

  <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

    <!-- Prénom et Nom -->
    <div class="form-group">
      <label for="firstName">Prénom</label>
      <input id="firstName" formControlName="firstName" type="text" placeholder="Prénom" />
    </div>

    <div class="form-group">
      <label for="lastName">Nom</label>
      <input id="lastName" formControlName="lastName" type="text" placeholder="Nom" />
    </div>

    <!-- Date de naissance -->
    <div class="form-group">
      <label for="birthDate">Date de naissance</label>
      <input id="birthDate" formControlName="birthDate" type="date" />
    </div>

    <!-- Email et mot de passe -->
    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" formControlName="email" type="email" placeholder="Email" />
    </div>

    <div class="form-group">
      <label for="password">Mot de passe</label>
      <input id="password" formControlName="password" type="password" placeholder="Mot de passe" />
    </div>

    <!-- Photo de profil -->
    <div class="form-group">
      <label for="photo">Photo de profil</label>
      <input id="photo" type="file" (change)="onFileSelected($event)" />
      <div class="preview" *ngIf="previewUrl">
        <img [src]="previewUrl" alt="Aperçu de la photo" />
      </div>
    </div>

    <!-- Bouton submit -->
    <button type="submit" [disabled]="loading">
      {{ loading ? 'Inscription...' : 'S’inscrire' }}
    </button>
  </form>
</div>
