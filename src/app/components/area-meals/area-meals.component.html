<div class="area-meals-container">

  <h2>Plats de la région : {{ area }}</h2>

  <div *ngIf="loading" class="loading">
    Chargement...
  </div>

  <div class="meals-grid">
    <div
      class="meal-card"
      *ngFor="let meal of meals"
      [routerLink]="['/meal', meal.idMeal]"
    >

      <img
        [src]="meal.strMealThumb"
        [alt]="meal.strMeal"
      >

      <h3>{{ meal.strMeal }}</h3>

      <a
        class="btn-details"
        [routerLink]="['/meal', meal.idMeal]"
        (click)="$event.stopPropagation()"
      >
        Voir détails
      </a>

    </div>
  </div>

</div>
