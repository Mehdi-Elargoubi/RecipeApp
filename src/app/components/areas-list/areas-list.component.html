<div class="areas-container">

  <h2 class="areas-title">Liste des Meals par Région</h2>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">
    Chargement des régions culinaires...
  </div>

  <!-- Error -->
  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <!-- Area List -->
  <div class="areas-grid" *ngIf="!loading && !error">
    <div
      class="area-card"
      *ngFor="let area of areas"
      [routerLink]="['/areas', area.strArea]"
    >
      <span class="area-text">{{ area.strArea }}</span>
    </div>
  </div>

</div>
